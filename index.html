<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Cycling Training Planner</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div id="loading" class="loading-screen">
      <div class="loading-card">
        <img class="loading-gif" src="loader.gif" alt="Loading" />
        <div class="loading-text">Rolling Into Your Week</div>
        <div class="loading-sub">Loading planner…</div>
      </div>
    </div>
    <div id="root"></div>

    <!-- React + ReactDOM (production builds for faster load) -->
    <script src="vendor/react.production.min.js"></script>
    <script src="vendor/react-dom.production.min.js"></script>

    <!-- Babel for JSX in browser -->
    <script src="vendor/babel.min.js"></script>

    <!-- Libraries -->
    <script src="vendor/react-beautiful-dnd.min.js"></script>

    <script type="text/babel" src="app.js"></script>
  </body>
</html>
